services:
  codereferee-server:
    build:
      context: .
    image: codereferee-server:latest
    container_name: codereferee-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://codereferee-db:5432/codereferee
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: codereferee-redis
      SPRING_DATA_REDIS_PORT: 6379
      SANDBOX_BASE_URL: http://sandbox-python:8000
      AI_CORE_ENABLED: false
    depends_on:
      codereferee-db:
        condition: service_healthy
      codereferee-redis:
        condition: service_healthy
      sandbox-python:
        condition: service_healthy
    networks:
      - codereferee-network

  sandbox-python:
    build:
      context: ./sandbox-python
    image: codereferee-sandbox-python:latest
    container_name: codereferee-sandbox-python
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - codereferee-network

  codereferee-db:
    image: postgres:17-alpine
    container_name: codereferee-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codereferee
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codereferee"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - codereferee-network

  codereferee-redis:
    image: redis:alpine
    container_name: codereferee-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - codereferee-network

  prometheus:
    image: prom/prometheus:latest
    container_name: codereferee-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      codereferee-server:
        condition: service_started
    networks:
      - codereferee-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: codereferee-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - codereferee-network
    restart: unless-stopped

networks:
  codereferee-network:
    driver: bridge
